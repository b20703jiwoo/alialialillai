<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚪 몬티 홀 문제 시뮬레이터</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f7f9fc;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        
        /* 탭 스타일 */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-btn:first-child { border-radius: 5px 0 0 5px; }
        .tab-btn:last-child { border-radius: 0 5px 5px 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 문 스타일 */
        .doors-container { display: flex; justify-content: space-between; margin: 30px 0; gap: 10px; }
        .door {
            flex: 1;
            height: 160px;
            background-color: #d35400;
            border: 4px solid #e67e22;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, border-color 0.3s;
        }
        .door:hover { transform: scale(1.03); }
        .door.selected { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .door.opened { background-color: #bdc3c7; border-color: #95a5a6; cursor: default; }
        .emoji { font-size: 32px; margin-top: 10px; }

        /* 안내 및 버튼 메시지 */
        .message-box {
            background-color: #e8f4f8;
            padding: 15px;
            border-left: 5px solid #3498db;
            margin: 20px 0;
            font-size: 15px;
            line-height: 1.5;
        }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button.action-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #2ecc71; color: white; }
        .btn-secondary { background: #e74c3c; color: white; }
        .btn-reset { background: #34495e; color: white; }

        /* 스코어보드 및 시뮬레이션 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .score-card { background: #f8f9fa; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #e2e8f0;}
        .score-val { font-size: 24px; font-weight: bold; color: #2c3e50; margin: 5px 0; }
        
        .sim-control { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        /* 커스텀 그래프 스타일 (외부 라이브러리 배제) */
        .pure-chart { margin-top: 20px; }
        .chart-row { margin-bottom: 15px; }
        .chart-label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .bar-wrapper { background: #eee; border-radius: 4px; overflow: hidden; height: 25px; width: 100%; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease-in-out; display: flex; align-items: center; justify-content: flex-end; padding-right: 5px; color: white; font-size: 12px; font-weight: bold; }
        .bg-keep { background-color: #34495e; }
        .bg-switch { background-color: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚪 몬티 홀 시뮬레이터</h1>
    <p class="description">직관과 수학적 확률의 대결!</p>

    <div class="tabs">
        <button class="tab-btn active" id="btn-play" onclick="switchTab('play')">🎮 직접 플레이</button>
        <button class="tab-btn" id="btn-sim" onclick="switchTab('sim')">📊 자동 시뮬레이션</button>
    </div>

    <div id="tab-play" class="tab-content active">
        <div class="message-box" id="play-msg">1번, 2번, 3번 문 중 하나를 선택하세요!</div>
        
        <div class="doors-container">
            <div class="door" id="door-0" onclick="selectDoor(0)"><div>1번 문</div><div class="emoji" id="emoji-0">🚪</div></div>
            <div class="door" id="door-1" onclick="selectDoor(1)"><div>2번 문</div><div class="emoji" id="emoji-1">🚪</div></div>
            <div class="door" id="door-2" onclick="selectDoor(2)"><div>3번 문</div><div class="emoji" id="emoji-2">🚪</div></div>
        </div>

        <div class="btn-group" id="choice-buttons" style="display: none;">
            <button class="action-btn btn-primary" onclick="makeFinalDecision(false)">처음 선택 그대로 유지 (Keep)</button>
            <button class="action-btn btn-secondary" onclick="makeFinalDecision(true)">다른 문으로 변경 (Switch)</button>
        </div>
        <button class="action-btn btn-reset" id="reset-btn" onclick="initGame()" style="display: none;">🔄 한 판 더 하기</button>

        <h3 style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">📊 나의 플레이 기록</h3>
        <div class="grid">
            <div class="score-card">
                <div>유지하기 (Keep)</div>
                <div class="score-val" id="rate-keep">0%</div>
                <div id="count-keep" style="font-size: 12px; color: #7f8c8d;">승리: 0 / 총: 0</div>
            </div>
            <div class="score-card">
                <div>바꾸기 (Switch)</div>
                <div class="score-val" id="rate-change">0%</div>
                <div id="count-change" style="font-size: 12px; color: #7f8c8d;">승리: 0 / 총: 0</div>
            </div>
        </div>
    </div>

    <div id="tab-sim" class="tab-content">
        <div class="sim-control">
            <label for="sim-range" style="font-weight: bold;">시뮬레이션 횟수: <span id="sim-count-txt" style="color:#3498db;">1000</span>번</label>
            <input type="range" id="sim-range" min="100" max="5000" step="100" value="1000" oninput="document.getElementById('sim-count-txt').innerText=this.value">
            <button class="action-btn btn-primary" onclick="runSimulation()">⚡ 시뮬레이션 시작</button>
        </div>
        <div class="message-box" id="sim-msg">버튼을 누르면 컴퓨터가 대량으로 시뮬레이션을 돌립니다.</div>
        
        <div class="pure-chart">
            <div class="chart-row">
                <div class="chart-label">유지하기 (Keep) 승률</div>
                <div class="bar-wrapper">
                    <div id="bar-keep" class="bar-fill bg-keep">0%</div>
                </div>
            </div>
            <div class="chart-row">
                <div class="chart-label">바꾸기 (Switch) 승률</div>
                <div class="bar-wrapper">
                    <div id="bar-change" class="bar-fill bg-switch">0%</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let doors = ['🐐', '🐐', '🚗'];
    let stage = 1; 
    let userChoice = null;
    let hostRevealed = null;

    let stats = { keepWins: 0, keepTotal: 0, changeWins: 0, changeTotal: 0 };

    function initGame() {
        stage = 1;
        userChoice = null;
        hostRevealed = null;
        
        // 확실하고 직관적인 셔플 로직으로 수정
        doors = ['🐐', '🐐', '🚗'];
        for (let i = doors.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [doors[i], doors[j]] = [doors[j], doors[i]];
        }

        document.getElementById('play-msg').innerText = "1번, 2번, 3번 문 중 하나를 선택하세요!";
        document.getElementById('choice-buttons').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'none';

        for(let i=0; i<3; i++) {
            let d = document.getElementById(`door-${i}`);
            d.className = 'door';
            document.getElementById(`emoji-${i}`).innerText = '🚪';
        }
    }

    function selectDoor(idx) {
        if (stage !== 1) return;
        userChoice = idx;
        document.getElementById(`door-${idx}`).classList.add('selected');

        let possibleReveals = [];
        for(let i=0; i<3; i++) {
            if(i !== userChoice && doors[i] === '🐐') {
                possibleReveals.push(i);
            }
        }
        
        // 무작위로 사회자가 열 문 선택
        hostRevealed = possibleReveals[Math.floor(Math.random() * possibleReveals.length)];
        
        let hostDoor = document.getElementById(`door-${hostRevealed}`);
        hostDoor.classList.add('opened');
        document.getElementById(`emoji-${hostRevealed}`).innerText = '🐐';

        stage = 2;
        document.getElementById('play-msg').innerHTML = `💡 <b>${idx+1}번 문</b>을 선택하셨습니다.<br>🧙 사회자가 염소가 있는 <b>${hostRevealed+1}번 문</b>을 열었습니다! 선택을 바꾸시겠습니까?`;
        document.getElementById('choice-buttons').style.display = 'flex';
    }

    function makeFinalDecision(isSwitch) {
        if (stage !== 2) return;
        
        let finalChoice = userChoice;
        if (isSwitch) {
            for(let i=0; i<3; i++) {
                if(i !== userChoice && i !== hostRevealed) finalChoice = i;
            }
        }

        let isWin = (doors[finalChoice] === '🚗');
        if (isSwitch) {
            stats.changeTotal++;
            if(isWin) stats.changeWins++;
        } else {
            stats.keepTotal++;
            if(isWin) stats.keepWins++;
        }

        stage = 3;
        document.getElementById('choice-buttons').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';

        for(let i=0; i<3; i++) {
            let d = document.getElementById(`door-${i}`);
            document.getElementById(`emoji-${i}`).innerText = doors[i];
            if(i === finalChoice) {
                d.classList.add(isWin ? 'selected' : 'opened');
            }
        }

        if(isWin) {
            document.getElementById('play-msg').innerHTML = `🎉 <b>축하합니다! 자동차(🚗)를 획득하셨습니다!</b>`;
        } else {
            document.getElementById('play-msg').innerHTML = `🐐 <b>아쉽네요! 염소가 나왔습니다.</b>`;
        }

        updateScoreboard();
    }

    function updateScoreboard() {
        let keepRate = stats.keepTotal > 0 ? ((stats.keepWins / stats.keepTotal) * 100).toFixed(1) : 0;
        let changeRate = stats.changeTotal > 0 ? ((stats.changeWins / stats.changeTotal) * 100).toFixed(1) : 0;

        document.getElementById('rate-keep').innerText = keepRate + '%';
        document.getElementById('count-keep').innerText = `승리: ${stats.keepWins} / 총: ${stats.keepTotal}`;

        document.getElementById('rate-change').innerText = changeRate + '%';
        document.getElementById('count-change').innerText = `승리: ${stats.changeWins} / 총: ${stats.changeTotal}`;
    }

    function switchTab(tab) {
        document.getElementById('btn-play').classList.remove('active');
        document.getElementById('btn-sim').classList.remove('active');
        document.getElementById('tab-play').classList.remove('active');
        document.getElementById('tab-sim').classList.remove('active');
        
        if(tab === 'play') {
            document.getElementById('btn-play').classList.add('active');
            document.getElementById('tab-play').classList.add('active');
        } else {
            document.getElementById('btn-sim').classList.add('active');
            document.getElementById('tab-sim').classList.add('active');
        }
    }

    function runSimulation() {
        let count = parseInt(document.getElementById('sim-range').value);
        let keepWins = 0;
        let changeWins = 0;

        for(let i=0; i<count; i++) {
            let simDoors = ['🐐', '🐐', '🚗'];
            // 시뮬레이션용 빠른 셔플
            for (let s = 2; s > 0; s--) {
                const j = Math.floor(Math.random() * (s + 1));
                [simDoors[s], simDoors[j]] = [simDoors[j], simDoors[s]];
            }
            let myChoice = Math.floor(Math.random() * 3);

            if(simDoors[myChoice] === '🚗') keepWins++;
            if(simDoors[myChoice] === '🐐') changeWins++; 
        }

        let keepRate = ((keepWins / count) * 100).toFixed(1);
        let changeRate = ((changeWins / count) * 100).toFixed(1);

        document.getElementById('sim-msg').innerHTML = `💡 <b>${count}회 시뮬레이션 결과</b><br>• 유지하기 승리: ${keepWins}회<br>• 바꾸기 승리: ${changeWins}회`;

        // 내장 그래픽 바 가로길이 변경
        document.getElementById('bar-keep').style.width = keepRate + '%';
        document.getElementById('bar-keep').innerText = keepRate + '%';
        
        document.getElementById('bar-change').style.width = changeRate + '%';
        document.getElementById('bar-change').innerText = changeRate + '%';
    }

    // 첫 실행
    initGame();
</script>
</body>
</html>
