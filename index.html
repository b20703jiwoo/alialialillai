<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚪 몬티 홀 문제 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f7f9fc;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        
        /* 탭 스타일 */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-btn:first-child { border-radius: 5px 0 0 5px; }
        .tab-btn:last-child { border-radius: 0 5px 5px 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 문 스타일 */
        .doors-container { display: flex; justify-content: space-around; margin: 30px 0; }
        .door {
            width: 120px;
            height: 180px;
            background-color: #d35400;
            border: 4px solid #e67e22;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
        }
        .door:hover { transform: scale(1.05); }
        .door.selected { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .door
